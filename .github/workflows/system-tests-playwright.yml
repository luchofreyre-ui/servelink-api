# System tests: API + web, Playwright (list to logs + JSON file for upload), upload to persistent system-tests API, artifacts.
#
# Required GitHub repo secrets:
#   SYSTEM_TESTS_REPORT_URL      e.g. https://YOUR_HOSTED_API/api/v1/admin/system-tests/report
#   SYSTEM_TESTS_ADMIN_EMAIL     admin user email on the hosted target
#   SYSTEM_TESTS_ADMIN_PASSWORD  admin user password (used only to mint a short-lived JWT at job runtime)
#
# Notes:
# - Playwright still runs against the runner-local API/web stack.
# - Ingestion is sent to a persistent hosted environment, not the ephemeral CI database.
# - Do not echo tokens or passwords.

name: System tests (Playwright)

on:
  schedule:
    # Daily 06:00 UTC — adjust as needed
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      playwright_lane:
        description: "When playwright_paths is empty — fast (default CI gate), deep only, or full (fast + deep)"
        required: false
        default: fast
        type: choice
        options:
          - fast
          - deep
          - full
      playwright_paths:
        description: "Optional override for `playwright test` args (replaces lane). Example: tests/playwright/smoke"
        required: false
        default: ""
        type: string
      skip_upload:
        description: "Skip POST to hosted /api/v1/admin/system-tests/report"
        required: false
        default: false
        type: boolean

concurrency:
  group: system-tests-playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  playwright-system-tests:
    name: Stack + Playwright + upload
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: servelink
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d servelink"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30

    env:
      CI: "true"

      # Runner-local stack for Playwright execution
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/servelink
      JWT_SECRET: ci-system-tests-jwt-secret-not-for-production-use
      JWT_ACCESS_SECRET: ci-system-tests-jwt-access-secret-not-for-production-use
      APP_BASE_URL: http://127.0.0.1:3001
      WEB_BASE_URL: http://127.0.0.1:3000
      DISABLE_DEV_SCENARIO_API: "0"

      # Playwright + web client target the runner-local stack
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_API_BASE_URL: http://127.0.0.1:3001/api/v1
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3001

      # Upload metadata + stable JSON path
      PLAYWRIGHT_UPLOAD_SOURCE: github-actions
      PLAYWRIGHT_JSON_REPORT: /tmp/playwright-report.json

      # Persistent hosted ingest target
      SYSTEM_TESTS_REPORT_URL: ${{ secrets.SYSTEM_TESTS_REPORT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # No npm cache: avoid stale resolution for file:../../packages/system-test-intelligence.

      - name: Clean install (node_modules only)
        run: |
          rm -rf services/api/node_modules
          rm -rf apps/web/node_modules
          rm -rf packages/system-test-intelligence/node_modules

      - name: Install API dependencies
        working-directory: services/api
        run: npm ci

      - name: Build system-test-intelligence
        working-directory: packages/system-test-intelligence
        run: |
          npm install
          npm run build

      - name: Prisma generate + migrate
        working-directory: services/api
        run: |
          npx prisma generate
          npx prisma migrate deploy

      # Also runs build:system-test-intelligence (tsc) before API compile — keeps lockfile-driven installs honest.
      - name: Build API
        working-directory: services/api
        run: npm run build

      - name: Start API (background)
        working-directory: services/api
        run: |
          nohup npm run start > "${RUNNER_TEMP}/api.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/api.pid"
          for i in $(seq 1 90); do
            if curl -fsS "http://127.0.0.1:3001/api/v1/health" >/dev/null 2>&1; then
              echo "API is up."
              exit 0
            fi
            sleep 1
          done
          echo "API failed to become healthy."
          tail -n 200 "${RUNNER_TEMP}/api.log" || true
          exit 1

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web
        working-directory: apps/web
        env:
          NODE_ENV: production
        run: npm run build

      - name: Start web (background)
        working-directory: apps/web
        run: |
          nohup npm run start > "${RUNNER_TEMP}/web.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/web.pid"
          for i in $(seq 1 120); do
            if curl -fsS -o /dev/null "http://127.0.0.1:3000/" 2>/dev/null; then
              echo "Web is up."
              exit 0
            fi
            sleep 1
          done
          echo "Web failed to become ready."
          tail -n 200 "${RUNNER_TEMP}/web.log" || true
          exit 1

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright (list + JSON report)
        id: playwright
        working-directory: apps/web
        continue-on-error: true
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PATHS: ${{ github.event.inputs.playwright_paths }}
          INPUT_LANE: ${{ github.event.inputs.playwright_lane }}
        run: |
          set +e
          PATHS_OVERRIDE=""
          if [ "${EVENT_NAME}" = "schedule" ]; then
            PW_ARGS="--project=fast --project=deep"
            LANE_SLUG="full-suite"
            LANE_LABEL="scheduled · fast + deep (full suite)"
            PATHS_OVERRIDE=""
          elif [ -n "${INPUT_PATHS:-}" ]; then
            PW_ARGS="${INPUT_PATHS}"
            HASH="$(printf '%s' "${PW_ARGS}" | sha256sum | awk '{print $1}' | cut -c1-8)"
            LANE_SLUG="custom-${HASH}"
            LANE_LABEL="custom · playwright_paths override"
            PATHS_OVERRIDE="${INPUT_PATHS}"
          else
            case "${INPUT_LANE:-fast}" in
              deep)
                PW_ARGS="--project=deep"
                LANE_SLUG="deep"
                LANE_LABEL="manual · deep project only"
                ;;
              full)
                PW_ARGS="--project=fast --project=deep"
                LANE_SLUG="full"
                LANE_LABEL="manual · fast + deep"
                ;;
              *)
                PW_ARGS="--project=fast"
                LANE_SLUG="fast"
                LANE_LABEL="manual · fast gate"
                ;;
            esac
            PATHS_OVERRIDE=""
          fi

          FINAL_CMD="npx playwright test ${PW_ARGS} -c playwright.config.ts --max-failures=1"

          {
            echo "## Playwright lane triage"
            echo ""
            echo "- **GitHub event:** \`${EVENT_NAME}\`"
            echo "- **Lane:** ${LANE_LABEL}"
            echo "- **lane_slug** (artifacts + upload metadata): \`${LANE_SLUG}\`"
            if [ -n "${PATHS_OVERRIDE}" ]; then
              echo "- **playwright_paths override:**"
              echo '```'
              echo "${PATHS_OVERRIDE}"
              echo '```'
            else
              echo "- **playwright_paths override:** _none (lane selector used)_"
            fi
            echo "- **Final command:**"
            echo '```'
            echo "${FINAL_CMD}"
            echo '```'
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

          {
            echo "════════════════════════════════════════════════════════════"
            echo "Playwright lane triage"
            echo "════════════════════════════════════════════════════════════"
            echo "GitHub event:     ${EVENT_NAME}"
            echo "Lane:             ${LANE_LABEL}"
            echo "lane_slug:        ${LANE_SLUG}"
            echo "paths override:   ${PATHS_OVERRIDE:-<none>}"
            echo "Final command:"
            echo "  ${FINAL_CMD}"
            echo "════════════════════════════════════════════════════════════"
          }

          echo "::notice title=Playwright lane::slug=${LANE_SLUG} · ${LANE_LABEL}"

          echo "lane_slug=${LANE_SLUG}" >> "${GITHUB_OUTPUT}"
          echo "lane_label=${LANE_LABEL}" >> "${GITHUB_OUTPUT}"
          {
            echo "paths_override<<EOF"
            echo "${PATHS_OVERRIDE}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
          {
            echo "final_command<<EOF"
            echo "${FINAL_CMD}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          # shellcheck disable=SC2086
          npx playwright test ${PW_ARGS} -c playwright.config.ts --max-failures=1
          PW_EXIT=$?
          echo "playwright_exit=${PW_EXIT}" >> "${GITHUB_OUTPUT}"
          exit ${PW_EXIT}

      - name: Upload Playwright artifacts (trace / video / screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ steps.playwright.outputs.lane_slug }}
          path: apps/web/test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload JSON report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-json-report-${{ steps.playwright.outputs.lane_slug }}
          path: ${{ env.PLAYWRIGHT_JSON_REPORT }}
          if-no-files-found: ignore
          retention-days: 14

      - name: Validate hosted upload config
        if: always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_upload != 'true')
        env:
          SYSTEM_TESTS_ADMIN_EMAIL: ${{ secrets.SYSTEM_TESTS_ADMIN_EMAIL }}
          SYSTEM_TESTS_ADMIN_PASSWORD: ${{ secrets.SYSTEM_TESTS_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ ! -s "${PLAYWRIGHT_JSON_REPORT}" ]; then
            echo "No JSON report at ${PLAYWRIGHT_JSON_REPORT}; upload validation not needed."
            exit 0
          fi

          if [ -z "${SYSTEM_TESTS_REPORT_URL:-}" ]; then
            echo "Missing required secret: SYSTEM_TESTS_REPORT_URL"
            exit 1
          fi

          if [ -z "${SYSTEM_TESTS_ADMIN_EMAIL:-}" ]; then
            echo "Missing required secret: SYSTEM_TESTS_ADMIN_EMAIL"
            exit 1
          fi

          if [ -z "${SYSTEM_TESTS_ADMIN_PASSWORD:-}" ]; then
            echo "Missing required secret: SYSTEM_TESTS_ADMIN_PASSWORD"
            exit 1
          fi

      - name: Ingest report (hosted system-tests API)
        if: always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_upload != 'true')
        env:
          SYSTEM_TESTS_ADMIN_EMAIL: ${{ secrets.SYSTEM_TESTS_ADMIN_EMAIL }}
          SYSTEM_TESTS_ADMIN_PASSWORD: ${{ secrets.SYSTEM_TESTS_ADMIN_PASSWORD }}
          GIT_BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          PLAYWRIGHT_LANE: ${{ steps.playwright.outputs.lane_slug }}
          PLAYWRIGHT_LANE_LABEL: ${{ steps.playwright.outputs.lane_label }}
        working-directory: apps/web
        run: |
          set -euo pipefail

          if [ ! -s "${PLAYWRIGHT_JSON_REPORT}" ]; then
            echo "No JSON report at ${PLAYWRIGHT_JSON_REPORT}; skipping upload."
            exit 0
          fi

          {
            echo "## System-tests upload context"
            echo ""
            echo "- **PLAYWRIGHT_LANE** (slug): \`${PLAYWRIGHT_LANE:-}\`"
            echo "- **PLAYWRIGHT_LANE_LABEL**: ${PLAYWRIGHT_LANE_LABEL:-}"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

          API_BASE="$(printf '%s' "${SYSTEM_TESTS_REPORT_URL}" | sed -E 's#(/api/v1/admin/system-tests/report)$##')"
          export NEXT_PUBLIC_API_BASE_URL="${API_BASE}"

          LOGIN_BODY="$(jq -n \
            --arg email "${SYSTEM_TESTS_ADMIN_EMAIL}" \
            --arg password "${SYSTEM_TESTS_ADMIN_PASSWORD}" \
            '{email: $email, password: $password}')"

          LOGIN_RES="$(curl -fsS -X POST "${API_BASE}/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d "${LOGIN_BODY}")"

          ACCESS_TOKEN="$(printf '%s' "${LOGIN_RES}" | jq -r '.accessToken // empty')"
          if [ -z "${ACCESS_TOKEN}" ]; then
            echo "Hosted login failed: no accessToken in response (check credentials and that the user exists on the hosted API)."
            exit 1
          fi

          export SYSTEM_TESTS_ADMIN_TOKEN="${ACCESS_TOKEN}"

          npm run upload:playwright -- --file="${PLAYWRIGHT_JSON_REPORT}"

      - name: Stop background servers
        if: always()
        run: |
          for f in api.pid web.pid; do
            p="${RUNNER_TEMP}/${f}"
            if [ -f "$p" ]; then
              kill "$(cat "$p")" 2>/dev/null || true
            fi
          done

      - name: Fail job if Playwright failed
        if: steps.playwright.outcome == 'failure'
        run: |
          echo "Playwright exited non-zero."
          exit 1
